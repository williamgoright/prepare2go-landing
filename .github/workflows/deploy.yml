name: Deploy to Server
on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to GCP via SSH
        uses: appleboy/scp-action@master
        with:
          host: 34.171.156.222
          username: gcpuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/opt/ai-stack/landing"
